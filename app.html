<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mini Wordle Game</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      text-align: center;
      padding-top: 40px;
    }

    h1 {
      color: #2c3e50;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(5, 50px);
      grid-gap: 8px;
      justify-content: center;
      margin: 20px auto;
      width: 270px;
    }

    .tile {
      width: 50px;
      height: 50px;
      border: 2px solid #ccc;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 24px;
      font-weight: bold;
      background-color: white;
    }

    .correct {
      background-color: #6aaa64;
      color: white;
      border-color: #6aaa64;
    }

    .present {
      background-color: #c9b458;
      color: white;
      border-color: #c9b458;
    }

    .absent {
      background-color: #787c7e;
      color: white;
      border-color: #787c7e;
    }

    input {
      padding: 8px;
      font-size: 16px;
      width: 150px;
      margin-top: 20px;
    }

    button {
      padding: 8px 15px;
      font-size: 16px;
      margin-left: 10px;
      cursor: pointer;
    }

    #message {
      margin-top: 20px;
      font-weight: bold;
      font-size: 18px;
    }

    a {
      display: block;
      margin-top: 30px;
      color: #0066cc;
    }
  </style>
</head>

<body>

  <h1>Mini Wordle</h1>
  <p>Guess the 5‑letter word! You have 6 tries.</p>

  <div id="board"></div>

  <input id="guessInput" maxlength="5" placeholder="Enter guess">
  <button onclick="submitGuess()">Submit</button>

  <p id="message"></p>

  <a href="scratch.html">Back To The Elephants</a>

  <script>
    const words = ["APPLE", "BRAIN", "CHAIR", "PLANT", "WATER", "MONEY", "SMILE", "LIGHT"];
    const secret = words[Math.floor(Math.random() * words.length)];
    let currentRow = 0;

    // Create 6 rows × 5 tiles = 30 tiles
    const board = document.getElementById("board");
    for (let i = 0; i < 30; i++) {
      const tile = document.createElement("div");
      tile.classList.add("tile");
      board.appendChild(tile);
    }

    function submitGuess() {
      const input = document.getElementById("guessInput");
      let guess = input.value.toUpperCase();

      if (guess.length !== 5) {
        document.getElementById("message").textContent = "Guess must be 5 letters.";
        return;
      }

      const tiles = document.querySelectorAll(".tile");
      const start = currentRow * 5;

      // Fill tiles with letters
      for (let i = 0; i < 5; i++) {
        tiles[start + i].textContent = guess[i];

        if (guess[i] === secret[i]) {
          tiles[start + i].classList.add("correct");
        } else if (secret.includes(guess[i])) {
          tiles[start + i].classList.add("present");
        } else {
          tiles[start + i].classList.add("absent");
        }
      }

      if (guess === secret) {
        document.getElementById("message").textContent = "You win! The word was " + secret + ".";
        disableGame();
        return;
      }

      currentRow++;

      if (currentRow === 6) {
        document.getElementById("message").textContent = "Out of tries! The word was " + secret + ".";
        disableGame();
      }

      input.value = "";
    }

    function disableGame() {
      document.getElementById("guessInput").disabled = true;
    }
    <div id="keyboard">
  <div class="keyboard-row">
    <button class="key">Q</button>
    <button class="key">W</button>
    <button class="key">E</button>
    <button class="key">R</button>
    <button class="key">T</button>
    <button class="key">Y</button>
    <button class="key">U</button>
    <button class="key">I</button>
    <button class="key">O</button>
    <button class="key">P</button>
  </div>

  <div class="keyboard-row">
    <button class="key">A</button>
    <button class="key">S</button>
    <button class="key">D</button>
    <button class="key">F</button>
    <button class="key">G</button>
    <button class="key">H</button>
    <button class="key">J</button>
    <button class="key">K</button>
    <button class="key">L</button>
  </div>

  <div class="keyboard-row">
    <button class="key large-key">Enter</button>
    <button class="key">Z</button>
    <button class="key">X</button>
    <button class="key">C</button>
    <button class="key">V</button>
    <button class="key">B</button>
    <button class="key">N</button>
    <button class="key">M</button>
    <button class="key large-key">Del</button>
  </div>
</div>

  </script>

</body>
</html>
